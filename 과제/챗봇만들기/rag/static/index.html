<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>연구 데이터 RAG 챗봇</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
         background:#eef1f6; margin:0; height:100vh; display:flex; align-items:center; justify-content:center; }
  .wrap { width:560px; max-width:96vw; height:720px; max-height:96vh; background:#fff;
          border-radius:16px; box-shadow:0 8px 30px rgba(0,0,0,.12); display:flex; flex-direction:column; overflow:hidden; }
  header { background:#2d6cdf; color:#fff; padding:16px 20px; }
  header b { font-size:17px; }
  header small { display:block; opacity:.85; font-size:12px; margin-top:3px; }
  #badge { font-size:11px; background:rgba(255,255,255,.2); padding:2px 8px; border-radius:10px; }
  #chat { flex:1; padding:16px; overflow-y:auto; background:#f6f8fc; }
  .msg { margin:10px 0; display:flex; }
  .msg.user { justify-content:flex-end; }
  .bubble { max-width:80%; padding:11px 14px; border-radius:14px; line-height:1.5; font-size:14px;
            white-space:pre-wrap; word-break:break-word; }
  .user .bubble { background:#2d6cdf; color:#fff; border-bottom-right-radius:4px; }
  .bot .bubble { background:#fff; color:#1a1a1a; border:1px solid #e2e6ee; border-bottom-left-radius:4px; }
  .meta { font-size:11px; color:#8a92a6; margin-top:6px; }
  form { display:flex; padding:12px; gap:8px; border-top:1px solid #eee; }
  input { flex:1; padding:12px; border:1px solid #d5dae6; border-radius:22px; font-size:14px; outline:none; }
  input:focus { border-color:#2d6cdf; }
  button { background:#2d6cdf; color:#fff; border:none; border-radius:22px; padding:0 18px; font-size:14px; cursor:pointer; }
  button:disabled { opacity:.5; }
  .examples { padding:8px 12px; display:flex; gap:6px; flex-wrap:wrap; border-top:1px solid #f0f0f0; }
  .chip { font-size:12px; background:#eaf0fb; color:#2d6cdf; border:none; padding:6px 10px; border-radius:14px; cursor:pointer; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <b>연구 데이터 RAG 챗봇 📊</b> <span id="badge">backend: ?</span>
    <small>내 로컬 데이터(표·문서)를 검색·계산하여 답합니다</small>
  </header>
  <div id="chat">
    <div class="msg bot"><div class="bubble">안녕하세요! 실험 데이터에 대해 물어보세요.
아래 예시를 눌러보거나 직접 질문해도 됩니다.</div></div>
  </div>
  <div class="examples">
    <button class="chip">high 그룹 yield_percent 평균은?</button>
    <button class="chip">yield_percent 최댓값은?</button>
    <button class="chip">최적 반응 조건이 뭐야?</button>
    <button class="chip">촉매 농도가 수율에 어떤 영향을 줘?</button>
  </div>
  <form id="form">
    <input id="input" autocomplete="off" placeholder="질문을 입력하세요..." />
    <button id="send" type="submit">전송</button>
  </form>
</div>

<script>
const chat = document.getElementById("chat");
const form = document.getElementById("form");
const input = document.getElementById("input");
const send = document.getElementById("send");
const badge = document.getElementById("badge");

fetch("/health").then(r=>r.json()).then(d=>{ badge.textContent = "backend: " + d.backend; }).catch(()=>{});

function addMsg(text, who, meta) {
  const msg = document.createElement("div");
  msg.className = "msg " + who;
  msg.innerHTML = `<div><div class="bubble"></div></div>`;
  msg.querySelector(".bubble").textContent = text;
  if (meta) { const m=document.createElement("div"); m.className="meta"; m.textContent=meta; msg.firstChild.appendChild(m); }
  chat.appendChild(msg); chat.scrollTop = chat.scrollHeight;
  return msg;
}

async function ask(text) {
  if (!text) return;
  addMsg(text, "user");
  input.value = ""; send.disabled = true;
  const thinking = addMsg("…", "bot");
  try {
    const res = await fetch("/chat", { method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ message: text, top_k: 3 }) });
    const data = await res.json();
    thinking.querySelector(".bubble").textContent = data.reply || "(답변 없음)";
    const srcs = (data.doc_sources||[]).map(s=>`${s.source}(${s.score})`).join(", ");
    const meta = `backend: ${data.backend}` + (srcs ? ` · 출처: ${srcs}` : "");
    const m=document.createElement("div"); m.className="meta"; m.textContent=meta;
    thinking.firstChild.appendChild(m);
  } catch (err) {
    thinking.querySelector(".bubble").textContent = "오류: " + err;
  } finally { send.disabled = false; input.focus(); }
}

form.addEventListener("submit", e => { e.preventDefault(); ask(input.value.trim()); });
document.querySelectorAll(".chip").forEach(c => c.addEventListener("click", () => ask(c.textContent)));
</script>
</body>
</html>
